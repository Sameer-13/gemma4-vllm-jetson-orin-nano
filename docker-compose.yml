services:
  vllm:
    image: ghcr.io/nvidia-ai-iot/vllm:latest-jetson-orin
    container_name: vllm-qwen35-4b
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    pull_policy: always
    ipc: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command:
      - serve
      - cyankiwi/Qwen3.5-4B-AWQ-4bit
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=10000
      - --gpu-memory-utilization=0.8
      - --reasoning-parser=qwen3
      - --tool-call-parser=qwen3_coder
      - --enable-auto-tool-choice
      - --language-model-only
      - --enable-prefix-caching
      - --max-num-seqs=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
